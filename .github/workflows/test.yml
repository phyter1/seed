name: Test

# PR gate: typecheck + test every package with a test suite.
#
# Runs on pull_request against main and on push to main. Each package
# in the matrix installs its own deps, typechecks, then runs bun test.
# Mirrors the dev loop documented in CLAUDE.md:
#   bun install && bunx tsc --noEmit && bun test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/fleet/control
          - packages/memory
          - packages/inference/router
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install

      - name: Typecheck
        working-directory: ${{ matrix.package }}
        run: bunx tsc --noEmit

      - name: Test
        working-directory: ${{ matrix.package }}
        run: |
          set +e
          output=$(bun test 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ $status -ne 0 ]; then exit $status; fi
          if echo "$output" | grep -qE '^\s+[0-9]+ skip'; then
            echo "::error::Skipped tests detected — remove .skip/.todo before merging"
            exit 1
          fi

  skills-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install

      - name: Render skills
        run: bun run render-skills

      - name: Check for skills drift
        run: |
          if ! git diff --exit-code .claude/skills/; then
            echo "::error::Skill adapters are out of sync with sources. Run 'bun run render-skills' and commit the result."
            exit 1
          fi

      - name: Render CLAUDE.md
        run: bun run render-claude

      - name: Check for CLAUDE.md drift
        run: |
          if ! git diff --exit-code CLAUDE.md; then
            echo "::error::CLAUDE.md is out of sync with BOOT.md. Run 'bun run render-claude' and commit the result."
            exit 1
          fi
