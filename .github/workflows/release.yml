name: Release

# Publish Seed fleet binaries on version tags (v0.1.0, v1.2.3, ...).
#
# Bun cross-compiles, so we only need two runners:
# - macos-latest builds both darwin-arm64 and darwin-x64
# - ubuntu-latest builds linux-x64 (and linux-arm64 if we add it)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            family: darwin
            targets: "darwin-arm64 darwin-x64"
          - runner: ubuntu-latest
            family: linux
            targets: "linux-x64"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fleet-control dependencies
        working-directory: packages/fleet/control
        run: bun install

      - name: Install memory dependencies
        working-directory: packages/memory
        run: bun install

      - name: Install all sqlite-vec platform packages
        # Bun's `bun install` only pulls the platform-specific sqlite-vec
        # native extension for the host. For release artifacts we need all
        # three (darwin-arm64, darwin-x64, linux-x64), so force-install the
        # others so build-binaries.sh can copy them into dist/.
        working-directory: packages/memory
        shell: bash
        run: |
          VEC_VERSION=$(node -p "require('./node_modules/sqlite-vec/package.json').version")
          for platform in darwin-arm64 darwin-x64 linux-x64; do
            pkg="sqlite-vec-${platform}@${VEC_VERSION}"
            target_dir="node_modules/sqlite-vec-${platform}"
            if [ ! -d "$target_dir" ]; then
              echo "installing $pkg"
              npm pack "$pkg" --pack-destination /tmp/ --silent
              mkdir -p "$target_dir"
              tar -xzf /tmp/sqlite-vec-${platform}-${VEC_VERSION}.tgz -C "$target_dir" --strip-components=1
            fi
          done
          echo "sqlite-vec native extensions ready:"
          ls node_modules/sqlite-vec-*/vec0.*

      - name: Build fleet-control binaries
        working-directory: packages/fleet/control
        run: bash scripts/build-binaries.sh

      - name: Build memory binaries
        working-directory: packages/memory
        run: bash scripts/build-binaries.sh

      - name: Collect artifacts for this family
        shell: bash
        run: |
          mkdir -p release-assets
          for target in ${{ matrix.targets }}; do
            cp packages/fleet/control/dist/seed-agent-$target release-assets/
            cp packages/fleet/control/dist/seed-cli-$target release-assets/
            cp packages/fleet/control/dist/seed-control-plane-$target release-assets/
            cp packages/memory/dist/seed-memory-$target release-assets/
            # sqlite-vec native extension — ships alongside seed-memory
            # because bun-compiled binaries can't load .dylib/.so from
            # the virtual bunfs. Installer points SEED_VEC_PATH at it.
            vec_dir="packages/memory/dist/sqlite-vec-$target"
            if [ -d "$vec_dir" ]; then
              ext=$(find "$vec_dir" -maxdepth 1 -name "vec0.*" -print -quit)
              if [ -n "$ext" ]; then
                cp "$ext" "release-assets/vec0-$target.$(basename "$ext" | sed 's/vec0\.//')"
              fi
            fi
          done
          # Per-family checksums file so both jobs can upload without clobbering.
          # shasum ships with macOS; sha256sum with Linux.
          if command -v shasum >/dev/null 2>&1; then
            (cd release-assets && shasum -a 256 seed-* > checksums-${{ matrix.family }}.txt)
          else
            (cd release-assets && sha256sum seed-* > checksums-${{ matrix.family }}.txt)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seed-binaries-${{ matrix.family }}
          path: release-assets/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Merge checksums
        working-directory: release-assets
        run: |
          cat checksums-*.txt > checksums.txt
          rm -f checksums-darwin.txt checksums-linux.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
