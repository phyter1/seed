name: Release

# Publish Seed fleet binaries on version tags (v0.1.0, v1.2.3, ...).
#
# Bun cross-compiles, so we only need two runners:
# - macos-latest builds both darwin-arm64 and darwin-x64
# - ubuntu-latest builds linux-x64 (and linux-arm64 if we add it)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            family: darwin
            targets: "darwin-arm64 darwin-x64"
          - runner: ubuntu-latest
            family: linux
            targets: "linux-x64"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/fleet/control
        run: bun install

      - name: Build binaries
        working-directory: packages/fleet/control
        run: bash scripts/build-binaries.sh

      - name: Collect artifacts for this family
        working-directory: packages/fleet/control
        shell: bash
        run: |
          mkdir -p release-assets
          for target in ${{ matrix.targets }}; do
            cp dist/seed-agent-$target release-assets/
            cp dist/seed-cli-$target release-assets/
            cp dist/seed-control-plane-$target release-assets/
          done
          # Per-family checksums file so both jobs can upload without clobbering.
          # shasum ships with macOS; sha256sum with Linux.
          if command -v shasum >/dev/null 2>&1; then
            (cd release-assets && shasum -a 256 seed-* > checksums-${{ matrix.family }}.txt)
          else
            (cd release-assets && sha256sum seed-* > checksums-${{ matrix.family }}.txt)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seed-binaries-${{ matrix.family }}
          path: packages/fleet/control/release-assets/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Merge checksums
        working-directory: release-assets
        run: |
          cat checksums-*.txt > checksums.txt
          rm -f checksums-darwin.txt checksums-linux.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
