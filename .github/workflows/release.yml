name: Release

# Publish Seed fleet binaries on version tags (v0.1.0, v1.2.3, ...).
#
# Each runner compiles all 9 binaries (arm64 + x64 for darwin, x64 for linux)
# for agent, cli, and control-plane. We build every target on every runner
# because `bun build --compile --target=...` can cross-compile. The matrix
# exists so each artifact is produced on its native host: arm64 on macos-latest,
# x64 on macos-13, and linux x64 on ubuntu-latest. The upload step only ships
# the native artifacts from each runner to avoid duplicate release assets.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os: darwin
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: x64
          - runner: ubuntu-latest
            os: linux
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binaries
        working-directory: packages/fleet/control
        run: bash scripts/build-binaries.sh

      - name: Collect native artifacts
        working-directory: packages/fleet/control
        shell: bash
        run: |
          mkdir -p release-assets
          cp dist/seed-agent-${{ matrix.os }}-${{ matrix.arch }} release-assets/
          cp dist/seed-cli-${{ matrix.os }}-${{ matrix.arch }} release-assets/
          cp dist/seed-control-plane-${{ matrix.os }}-${{ matrix.arch }} release-assets/
          # Per-target checksums file so all jobs can upload without clobbering.
          # shasum ships with macOS; sha256sum with Linux.
          if command -v shasum >/dev/null 2>&1; then
            (cd release-assets && shasum -a 256 seed-* > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt)
          else
            (cd release-assets && sha256sum seed-* > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seed-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/fleet/control/release-assets/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Merge checksums
        working-directory: release-assets
        run: |
          cat checksums-*.txt > checksums.txt
          rm -f checksums-darwin-*.txt checksums-linux-*.txt
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
